services:
  - type: web
    name: devportfolio-backend
    runtime: java
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/auth/health
    envVars:
      - key: MONGODB_URI
        sync: false   # Set manually in Render dashboard
      - key: GITHUB_CLIENT_ID
        sync: false   # Set manually in Render dashboard
      - key: GITHUB_CLIENT_SECRET
        sync: false   # Set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # Set to your Vercel frontend URL in Render dashboard
      - key: JWT_SECRET
        generateValue: true
